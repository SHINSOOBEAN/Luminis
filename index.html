<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

    .font-cormorant  { font-family: 'Cormorant Garamond', Georgia, serif; }
    .font-sans       { font-family: 'DM Sans', sans-serif; }

    .glass {
      background: rgba(15,8,35,.65);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(168,85,247,.18);
    }
    .glow-text   { text-shadow: 0 0 20px rgba(192,132,252,.6); }
    .glow-border { box-shadow: 0 0 0 1px rgba(168,85,247,.3), 0 0 30px rgba(168,85,247,.1); }

    .input-field {
      background: rgba(10,5,25,.7);
      border: 1px solid rgba(168,85,247,.2);
      color: #e9d5ff;
      border-radius: 8px;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-field:focus        { border-color: rgba(168,85,247,.6); box-shadow: 0 0 0 3px rgba(168,85,247,.1); }
    .input-field::placeholder { color: rgba(192,132,252,.3); }

    .btn-primary {
      background: linear-gradient(135deg,rgba(126,34,206,.9),rgba(109,40,217,.8));
      border: 1px solid rgba(168,85,247,.4);
      color: #f3e8ff;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .03em;
      transition: all .2s;
      width: 100%;

    .btn-primary:hover { background: linear-gradient(135deg,rgba(147,51,234,.9),rgba(126,34,206,.8)); box-shadow: 0 0 20px rgba(168,85,247,.3); }

    .echo-card { filter: drop-shadow(0 0 8px rgba(168,85,247,.5)); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
  </style>
</head>

  Trash:    p=><Ic {...p} d={["M3 6h18","M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6","M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2","M10 11v6","M14 11v6"]} />,
  Warn:     p=><Ic {...p} d={["M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z","M12 9v4","M12 17h.01"]} />,
  Plus:     p=><Ic {...p} d={["M12 5v14","M5 12h14"]} />,
  Edit:     p=><Ic {...p} d={["M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7","M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"]} />,
  Check:    p=><Ic {...p} d="M20 6 9 17l-5-5" />,
  Upload:   p=><Ic {...p} d={["M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4","M17 8l-5-5-5 5","M12 3v12"]} />,
  FileText: p=><Ic {...p} d={["M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z","M14 2v6h6","M16 13H8","M16 17H8","M10 9H8"]} />,
};

// ─── Background stars (generated once at module level) ────────────────────────
const BG = Array.from({ length: 180 }, (_, i) => ({
  id:i, x:Math.random()*100, y:Math.random()*100,
  r:Math.random()*1.2+0.2, op:Math.random()*0.5+0.1, dur:Math.random()*4+3,
}));

// ─── Seed posts ───────────────────────────────────────────────────────────────
const SEED = [
  { id:1, x:18, y:22, size:2.8, bright:.95,
    title:"The Cartographer of Forgotten Seas",
    body:`She mapped coastlines that existed only between sleeping and waking — those liminal shores where the tide pulls back to reveal not sand, but the sediment of every conversation you meant to have.

Her instruments were unreliable. The compass needled always toward regret. The sextant measured not stars but the precise angle at which one person becomes a stranger to another.

Still, she drew. She drew with the conviction that if a place can be named, it cannot be entirely lost. And so she gave names to all the places grief had made in her: The Bay of Almost, Cape Forgiveness-Deferred, the long peninsula she called After You Left I Learned to Cook.

In the end, the map covered every wall of every room she ever lived in. Visitors would stand in her doorway, undone by the beauty of so much careful cartography, and they would ask: have you been to all these places?

She would smile at the question's innocence and say only: *I have never left them.*`,
    echoes:[
      {id:1,text:"The Bay of Almost broke something open in me. I've been sitting with it for ten minutes now."},
      {id:2,text:"Grief cartography — I've never seen it named so precisely."},
      {id:3,text:"The compass needled toward regret. Yes. Exactly yes."}
    ]
  },
  { id:2, x:62, y:15, size:2.2, bright:.8,
    title:"A Taxonomy of Silences",
    body:`There is the silence before thunder — pregnant, mineral, charged with the electricity of what is about to be said. And there is the silence after thunder, which is entirely different: rinsed, grateful, the world washed clean.

There is the silence of a room someone has just left, which holds the shape of them the way a pressed flower holds the shape of summer.

There is the silence between two people who once knew each other's breathing patterns in sleep, who now sit across a table ordering coffee, making small words do enormous work.

And there is the rarest silence — the one found only in perfect understanding — when language becomes redundant and two minds simply rest in each other like stones warmed by the same sun.

I have been collecting silences for years. I keep them in a jar on the windowsill. Mornings, I hold them up to the light to see which ones are still alive.`,
    echoes:[
      {id:1,text:"The silence that holds the shape of someone. I will carry this image."},
      {id:2,text:"I keep them in a jar on the windowsill. The whole essay earned that line."}
    ]
  },
  { id:3, x:35, y:55, size:3.2, bright:1,
    title:"Instructions for Becoming Water",
    body:`First, release the idea that you have edges.

This will take longer than you expect. You have been practicing edges your entire life — the sharp border of your name, the precise perimeter of your opinions, the defined shape of what you will and will not allow. Let all of this become suggestion, then memory, then nothing.

Second, learn the language of indirection. Water does not argue with stone. It simply continues, patient as centuries, until it finds the way through or the way around or, most quietly, the way beneath.

Third, understand that clarity and depth are not opposites. The clearest water can be the deepest. You can be fully transparent and still utterly fathomless.

Finally — and this is the hardest part — accept that you will take the shape of wherever you are held. This is not surrender. This is the highest form of attention: to know where you are by knowing what contains you.

Water does not mourn the vessel it has left. It is already becoming the river.`,
    echoes:[
      {id:1,text:"Clarity and depth are not opposites. I needed to hear this today."},
      {id:2,text:"The way you built to that final line — like watching tide come in."},
      {id:3,text:"Water does not argue with stone. I'm writing this somewhere I'll see it."},
      {id:4,text:"This is the piece that made me want to submit my own writing here."}
    ]
  },
  { id:4, x:78, y:42, size:2.0, bright:.75,
    title:"On the Weight of Light",
    body:`Physicists will tell you that light has momentum — that a photon, massless as it is, can still push. Prove it with a solar sail if you have one handy, they say, smiling at the impossible practicality.

What they don't explain is the light that presses differently. The particular quality of afternoon sun in late October, its angle changed just enough to say: *summer is over, truly over now.* The way it falls on familiar objects and makes them briefly strange, briefly precious.

Or the light through old glass, rippled and imperfect, that gently warps the world outside into something slightly more true than truth. A better truth. The truth of how it feels.

I have been trying to catch this light for years. In the morning I arrange myself near windows. In the afternoon I follow the yellow squares it makes across the floor until the square shrinks to a line and the line to nothing.

At night I remember: you cannot save light. You can only be where it is, for as long as it is, and let it press its weightless weight against your face.`,
    echoes:[{id:1,text:"The light through old glass, warped into something more true than truth. Stunning."}]
  },
  { id:5, x:50, y:78, size:2.5, bright:.88,
    title:"Rehearsal",
    body:`Every evening I rehearse the things I should have said. It is a meticulous practice, requiring good light and a willingness to be both audience and actor.

I give myself better lines. I deliver them with the steadiness I lacked at the time, when my voice had gone somewhere unreachable, when the words I needed were in a language my throat had forgotten.

In these rehearsals, I am never cruel. This is perhaps my failing — a rehearsal is useless if it doesn't prepare you for the actual performance, and the actual performance of being a person includes cruelty, includes the wrong words said perfectly, includes the necessary wound.

But I cannot seem to be cruel in rehearsal. Even alone, even in memory, I extend the courtesies I couldn't manage then.

Maybe this is what practice actually makes: not perfect, but kind. Maybe every evening I rehearse, I am rehearsing kindness. And maybe the real performance — next time, the next time — will be finally ready.`,

      {id:2,text:"The voice that had gone somewhere unreachable. I know that place exactly."},
      {id:3,text:"I've been rehearsing too. I didn't know that's what it was called."}

  },
  { id:6, x:88, y:68, size:1.8, bright:.7,
    title:"Small Hours",
    body:`At 3am the mind becomes honest in ways it refuses during daylight.

It is an uncurated honesty — the kind that doesn't perform for an audience, that doesn't arrange itself into the shape of what you'd like to believe. Just the raw material: this is what you want, this is what you fear, this is the thing you have been not-thinking for eleven months.

I used to fight these hours. Now I make tea. I sit with the particular darkness that exists between streetlight and window-glass and I allow the night its editorial work.

By morning the truth is softer. Not smaller — never smaller — but rounder, worn smooth by the sleep that comes eventually. Easier to carry.

The small hours are not for everyone. Some people sleep right through them and wake intact.

I have never been that kind of person. I have always been someone who needs to be awake for the difficult parts.`,
    echoes:[]
  },
  { id:7, x:12, y:68, size:2.3, bright:.85,
    title:"Letter to the Version of Me Who Got It Right",
    body:`Dear parallel self,

I imagine you made the same coffee that morning. Stood in the same kitchen. But then you said the thing — the honest thing, the difficult beautiful thing — and the whole trajectory of the next three years bent differently.

I don't resent you. That would require a kind of belief in my own alternative I don't quite possess. But I am curious about you, the way you might be curious about a door you didn't open: not certain it led somewhere better, just aware that it led somewhere *other.*

Do you still have the same dreams? I want to ask you this most of all. Whether the grammar of our unconscious persists across the choices we make, or whether a different life eventually requires different metaphors for its fears.

I think you are happy. Or not happy exactly — I don't believe that's the actual metric — but *well*. Calibrated. Living at the right frequency for the instrument you are.

I am still tuning. But I wanted you to know I'm glad you exist somewhere. Even in the grammar of might-have-been, you are evidence that I was capable of it.

With something warmer than envy,
*The Other One*`,
    echoes:[
      {id:1,text:"Living at the right frequency for the instrument you are. I've been searching for this phrase my whole life."},
      {id:2,text:"With something warmer than envy. The sign-off is everything."}
    ]
  }
];

// ═══════════════════════════════════════════════════════════════════════════════
//  ROOT
// ═══════════════════════════════════════════════════════════════════════════════

// ─── localStorage helpers ─────────────────────────────────────────────────────
const LS = {
  get: (key, fallback) => { try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; } catch { return fallback; } },
  set: (key, val)      => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} },
};

function App() {
  // Initialise from localStorage, falling back to defaults on first visit
  const [users,   setUsers]   = useState(() => LS.get("luminis_users", { luminis:{ password:"luminis", displayName:"A Wandering Mind" } }));
  const [posts,   setPosts]   = useState(() => LS.get("luminis_posts", SEED));
  const [me,      setMe]      = useState(() => LS.get("luminis_me",    null));
  const [view,    setView]    = useState(() => LS.get("luminis_me",    null) ? "constellation" : "gate");
  const [picked,  setPicked]  = useState(null);
  const [showEch, setShowEch] = useState(false);
  const [draft,   setDraft]   = useState("");
  const [sTab,    setSTab]    = useState("profile");
  const [aMode,   setAMode]   = useState("login");
  const [showUpload, setShowUpload] = useState(false);

  // Persist to localStorage whenever these values change
  useEffect(() => { LS.set("luminis_users", users); }, [users]);
  useEffect(() => { LS.set("luminis_posts",  posts); }, [posts]);
  useEffect(() => { LS.set("luminis_me",     me);    }, [me]);

  const doLogin  = (id,pw) => { if (users[id]?.password===pw){ setMe(id); setView("constellation"); return null; } return "Invalid credentials. The gate remains closed."; };
  const doSignup = (id,pw) => { if (users[id]) return "This name is already claimed by another wanderer."; if (id.length<3) return "Your unique ID must be at least 3 characters."; setUsers(u=>({...u,[id]:{password:pw,displayName:"Anonymous Wanderer"}})); setMe(id); setView("constellation"); return null; };
  const doLogout = () => { setMe(null); setView("gate"); setPicked(null); };
  const addEcho  = () => { if(!draft.trim()||!picked) return; const e={id:Date.now(),text:draft.trim()}; setPosts(p=>p.map(x=>x.id===picked.id?{...x,echoes:[...x.echoes,e]}:x)); setPicked(p=>({...p,echoes:[...p.echoes,e]})); setDraft(""); };
  const delPost  = id => { setPosts(p=>p.filter(x=>x.id!==id)); setPicked(null); setShowEch(false); };
  const delEcho  = (pid,eid) => { setPosts(p=>p.map(x=>x.id===pid?{...x,echoes:x.echoes.filter(e=>e.id!==eid)}:x)); setPicked(p=>({...p,echoes:p.echoes.filter(e=>e.id!==eid)})); };
  const updProf  = (dn,pw) => setUsers(u=>({...u,[me]:{...u[me],displayName:dn||u[me].displayName,...(pw?{password:pw}:{})}}));
  const addPost  = (title, body) => {
    const newPost = {
      id: Date.now(),
      x: 8 + Math.random() * 84,
      y: 8 + Math.random() * 84,
      size: 1.8 + Math.random() * 1.6,
      bright: 0.7 + Math.random() * 0.3,
      title, body, echoes: []
    };
    setPosts(p => [...p, newPost]);
    setShowUpload(false);
  };
  const updatePost = (id, title, body) => {
    setPosts(p => p.map(x => x.id===id ? {...x, title, body} : x));
    setPicked(p => p ? {...p, title, body} : p);
  };

  return (
    <div style={{width:"100vw",height:"100vh",overflow:"hidden",background:"#080613",position:"relative"}}>
      <AnimatePresence mode="wait">
        {view==="gate"          && <GatePage          key="gate"     onLogin={doLogin} onSignup={doSignup} aMode={aMode} setAMode={setAMode} />}
        {view==="constellation" && <MapPage           key="map"      posts={posts} onPick={p=>{setPicked(p);setShowEch(false);}} onSettings={()=>setView("settings")} onNew={()=>setShowUpload(true)} />}
        {view==="settings"      && <SettingsPage      key="settings" info={users[me]} onBack={()=>setView("constellation")} onUpdate={updProf} onLogout={doLogout} tab={sTab} setTab={setSTab} />}
      </AnimatePresence>
      <AnimatePresence>
        {picked && <Modal post={picked} showEch={showEch} setShowEch={setShowEch} draft={draft} setDraft={setDraft} onAdd={addEcho} onDelPost={delPost} onDelEcho={delEcho} onUpdate={updatePost} onClose={()=>{setPicked(null);setShowEch(false);}} />}
      </AnimatePresence>
      <AnimatePresence>
        {showUpload && <UploadModal onSubmit={addPost} onClose={()=>setShowUpload(false)} />}
      </AnimatePresence>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
//  GATE
// ═══════════════════════════════════════════════════════════════════════════════
function GatePage({ onLogin, onSignup, aMode, setAMode }) {
  const [id,setId]       = useState("");
  const [pw,setPw]       = useState("");
  const [vis,setVis]     = useState(false);
  const [err,setErr]     = useState("");
  const [busy,setBusy]   = useState(false);

  const go = async () => {
    setErr(""); setBusy(true);
    await new Promise(r=>setTimeout(r,500));
    const e = aMode==="login" ? onLogin(id,pw) : onSignup(id,pw);
    if (e) setErr(e);
    setBusy(false);
  };

  return (
    <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} transition={{duration:.4}}
      style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>

      <div style={{position:"absolute",inset:0,overflow:"hidden"}}>
        {BG.map(s=>(
          <motion.div key={s.id}
            animate={{opacity:[s.op,s.op*.3,s.op]}} transition={{duration:s.dur,repeat:Infinity,ease:"easeInOut"}}
            style={{position:"absolute",left:`${s.x}%`,top:`${s.y}%`,width:s.r*2,height:s.r*2,borderRadius:"50%",background:"white"}}/>
        ))}
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 80% 80% at 50% 50%,rgba(88,28,135,.25) 0%,transparent 70%)"}}/>
      </div>

      <motion.div initial={{opacity:0,y:40,scale:.96}} animate={{opacity:1,y:0,scale:1}} transition={{duration:.8,ease:[.16,1,.3,1]}}
        className="glass glow-border" style={{width:380,borderRadius:20,padding:"40px 36px",position:"relative",zIndex:10}}>

        <div style={{textAlign:"center",marginBottom:32}}>
          <motion.div animate={{opacity:[.6,1,.6]}} transition={{duration:3,repeat:Infinity}} style={{display:"flex",justifyContent:"center",marginBottom:12}}>
            <I.Sparkle size={28} style={{color:"#c084fc"}}/>
          </motion.div>
          <h1 className="font-serif glow-text" style={{fontSize:32,color:"#f3e8ff",letterSpacing:".05em",marginBottom:4}}>Luminis</h1>
          <p className="font-sans" style={{color:"rgba(192,132,252,.5)",fontSize:12,letterSpacing:".15em",textTransform:"uppercase"}}>Private Writing Circle</p>
        </div>

        <div style={{display:"flex",background:"rgba(10,5,25,.6)",borderRadius:10,padding:4,marginBottom:24,border:"1px solid rgba(168,85,247,.15)"}}>
          {["login","signup"].map(m=>(
            <button key={m} onClick={()=>{setAMode(m);setErr("");}}
              style={{flex:1,padding:"8px 0",borderRadius:7,border:"none",cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif",fontWeight:500,position:"relative",zIndex:1,color:aMode===m?"#f3e8ff":"rgba(192,132,252,.4)",background:aMode===m?"rgba(126,34,206,.7)":"transparent",transition:"all .25s"}}>
              {m==="login"?"Enter":"Join"}
            </button>
          ))}
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <label className="font-sans" style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"rgba(192,132,252,.5)",letterSpacing:".12em",textTransform:"uppercase",marginBottom:6}}>
              <I.User size={10}/> Unique ID
            </label>
            <input className="input-field" value={id} onChange={e=>setId(e.target.value)} placeholder="your.unique.id" onKeyDown={e=>e.key==="Enter"&&go()}/>
          </div>
          <div>
            <label className="font-sans" style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"rgba(192,132,252,.5)",letterSpacing:".12em",textTransform:"uppercase",marginBottom:6}}>
              <I.Lock size={10}/> Passphrase
            </label>
            <div style={{position:"relative"}}>
              <input className="input-field" type={vis?"text":"password"} value={pw} onChange={e=>setPw(e.target.value)}
                placeholder="••••••••" style={{paddingRight:40}} onKeyDown={e=>e.key==="Enter"&&go()}/>
              <button onClick={()=>setVis(!vis)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"rgba(192,132,252,.4)",padding:0,display:"flex"}}>
                {vis?<I.EyeOff size={14}/>:<I.Eye size={14}/>}
              </button>
            </div>
          </div>

          <AnimatePresence>
            {err && <motion.p key="e" initial={{opacity:0,y:-8}} animate={{opacity:1,y:0}} exit={{opacity:0}}
              className="font-sans" style={{color:"#f87171",fontSize:12,textAlign:"center"}}>{err}</motion.p>}
          </AnimatePresence>

          <button className="btn-primary" onClick={go}
            style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,height:42,marginTop:4}}>
            {busy ? <span className="spin"><I.Sparkle size={14}/></span>
                  : <><I.Feather size={14}/>{aMode==="login"?"Pass Through the Gate":"Claim Your Place"}</>}
          </button>
        </div>

        <p className="font-sans" style={{textAlign:"center",marginTop:20,color:"rgba(192,132,252,.3)",fontSize:11,fontStyle:"italic"}}>
          All voices here speak anonymously.
        </p>
      </motion.div>
    </motion.div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
//  CONSTELLATION MAP
// ═══════════════════════════════════════════════════════════════════════════════
function MapPage({ posts, onPick, onSettings, onNew }) {
  const el = useRef(null);
  const mx = useMotionValue(.5), my = useMotionValue(.5);
  const bx = useTransform(mx,[0,1],[-20,20]), by = useTransform(my,[0,1],[-20,20]);
  const mm = useCallback(e=>{ const r=el.current?.getBoundingClientRect(); if(r){mx.set(e.clientX/r.width);my.set(e.clientY/r.height);} },[mx,my]);

  return (
    <motion.div ref={el} initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} onMouseMove={mm}
      style={{width:"100%",height:"100%",position:"relative",overflow:"hidden"}}>

      <motion.div style={{position:"absolute",inset:-40,x:bx,y:by}}>
        {BG.map(s=>(
          <motion.div key={s.id}
            animate={{opacity:[s.op,s.op*.2,s.op]}} transition={{duration:s.dur,repeat:Infinity,ease:"easeInOut",delay:s.id*.04}}
            style={{position:"absolute",left:`${s.x}%`,top:`${s.y}%`,width:s.r*2,height:s.r*2,borderRadius:"50%",background:"white"}}/>
        ))}
      </motion.div>

      <div style={{position:"absolute",inset:0,pointerEvents:"none"}}>
        <div style={{position:"absolute",top:"20%",left:"30%",width:400,height:400,background:"radial-gradient(circle,rgba(88,28,135,.2) 0%,transparent 70%)",borderRadius:"50%"}}/>
        <div style={{position:"absolute",bottom:"30%",right:"20%",width:300,height:300,background:"radial-gradient(circle,rgba(109,40,217,.15) 0%,transparent 70%)",borderRadius:"50%"}}/>
      </div>

      <motion.div initial={{y:-30,opacity:0}} animate={{y:0,opacity:1}} transition={{delay:.3}}
        style={{position:"absolute",top:0,left:0,right:0,padding:"20px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:10}}>
        <div>
          <h1 className="font-serif glow-text" style={{fontSize:22,color:"#f3e8ff",letterSpacing:".04em"}}>Luminis</h1>
          <p className="font-sans" style={{color:"rgba(192,132,252,.4)",fontSize:11,letterSpacing:".1em",textTransform:"uppercase",marginTop:1}}>The Constellation</p>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <motion.button onClick={onNew} whileHover={{scale:1.04}} whileTap={{scale:.97}}
            style={{background:"linear-gradient(135deg,rgba(126,34,206,.85),rgba(109,40,217,.75))",border:"1px solid rgba(168,85,247,.5)",borderRadius:10,padding:"8px 16px",cursor:"pointer",color:"#f3e8ff",display:"flex",alignItems:"center",gap:7,fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:500,letterSpacing:".02em",boxShadow:"0 0 18px rgba(168,85,247,.25)"}}>
            <I.Plus size={14}/> New Writing
          </motion.button>
          <button onClick={onSettings}
            style={{background:"rgba(126,34,206,.2)",border:"1px solid rgba(168,85,247,.2)",borderRadius:10,padding:"8px 10px",cursor:"pointer",color:"rgba(192,132,252,.6)",display:"flex",transition:"all .2s"}}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(126,34,206,.4)";e.currentTarget.style.color="#c084fc";}}
            onMouseLeave={e=>{e.currentTarget.style.background="rgba(126,34,206,.2)";e.currentTarget.style.color="rgba(192,132,252,.6)";}}>
            <I.Settings size={15}/>
          </button>
        </div>
      </motion.div>

      {posts.map((p,i)=><StarDot key={p.id} post={p} delay={i*.1} onClick={()=>onPick(p)}/>)}

      <motion.p initial={{opacity:0}} animate={{opacity:1}} transition={{delay:1.5}} className="font-sans"
        style={{position:"absolute",bottom:28,left:"50%",transform:"translateX(-50%)",color:"rgba(192,132,252,.22)",fontSize:11,letterSpacing:".12em",textTransform:"uppercase",whiteSpace:"nowrap"}}>
        Each star holds a piece of writing
      </motion.p>
    </motion.div>
  );
}

function StarDot({ post, delay, onClick }) {
  const [hov,setHov] = useState(false);
  return (
    <motion.div initial={{opacity:0,scale:0}} animate={{opacity:1,scale:1}} transition={{delay,duration:.6,ease:[.34,1.56,.64,1]}}
      style={{position:"absolute",left:`${post.x}%`,top:`${post.y}%`,zIndex:5,cursor:"pointer"}}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={onClick}>

      <AnimatePresence>
        {hov&&<motion.div key="r" initial={{scale:.5,opacity:0}} animate={{scale:1,opacity:1}} exit={{scale:.5,opacity:0}}
          style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:post.size*40,height:post.size*40,borderRadius:"50%",background:"radial-gradient(circle,rgba(168,85,247,.25) 0%,transparent 70%)",pointerEvents:"none"}}/>}
      </AnimatePresence>

      <motion.div
        animate={{scale:[1,1.15,1],opacity:[post.bright*.8,post.bright,post.bright*.8]}}
        transition={{duration:2.5+post.id*.3,repeat:Infinity,ease:"easeInOut"}}
        style={{width:post.size*10,height:post.size*10,borderRadius:"50%",
          background:`radial-gradient(circle,rgba(245,208,254,${post.bright}) 0%,rgba(168,85,247,${post.bright*.6}) 50%,transparent 70%)`,
          filter:`drop-shadow(0 0 ${post.size*4}px rgba(192,132,252,${post.bright*.9}))`}}/>

      <AnimatePresence>
        {hov&&<motion.div key="t" initial={{opacity:0,y:6,scale:.95}} animate={{opacity:1,y:0,scale:1}} exit={{opacity:0,y:6,scale:.95}} transition={{duration:.15}}
          className="glass"
          style={{position:"absolute",top:"100%",left:"50%",transform:"translateX(-50%)",marginTop:10,padding:"8px 12px",borderRadius:8,whiteSpace:"nowrap",pointerEvents:"none",zIndex:20}}>
          <p className="font-serif"  style={{fontSize:12,color:"#e9d5ff"}}>{post.title}</p>
          <p className="font-sans"   style={{fontSize:10,color:"rgba(192,132,252,.45)",marginTop:2}}>{post.echoes.length} reflection{post.echoes.length!==1?"s":""}</p>
        </motion.div>}
      </AnimatePresence>
    </motion.div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
//  POST MODAL
// ═══════════════════════════════════════════════════════════════════════════════
function Modal({ post, showEch, setShowEch, draft, setDraft, onAdd, onDelPost, onDelEcho, onUpdate, onClose }) {
  const echoEl = useRef(null);
  const [cfmP,setCfmP]     = useState(false);
  const [cfmE,setCfmE]     = useState(null);
  const [editing,setEditing] = useState(false);
  const [editTitle,setEditTitle] = useState(post.title);
  const [editBody,setEditBody]   = useState(post.body);

  // Keep edit fields in sync if post changes externally
  useEffect(()=>{ setEditTitle(post.title); setEditBody(post.body); },[post.id]);

  useEffect(()=>{
    if(showEch&&echoEl.current) setTimeout(()=>echoEl.current?.scrollTo({top:echoEl.current.scrollHeight,behavior:"smooth"}),100);
  },[showEch,post.echoes.length]);

  const saveEdit = () => {
    if (!editTitle.trim()) return;
    onUpdate(post.id, editTitle.trim(), editBody.trim());
    setEditing(false);
  };

  const cancelEdit = () => {
    setEditTitle(post.title);
    setEditBody(post.body);
    setEditing(false);
  };

  return (
    <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}
      style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>

      <motion.div initial={{backdropFilter:"blur(0px)"}} animate={{backdropFilter:"blur(12px)"}} exit={{backdropFilter:"blur(0px)"}}
        style={{position:"absolute",inset:0,background:"rgba(5,2,15,.8)"}} onClick={onClose}/>

      <motion.div initial={{opacity:0,scale:.92,y:30}} animate={{opacity:1,scale:1,y:0}} exit={{opacity:0,scale:.92,y:30}}
        transition={{type:"spring",damping:28,stiffness:280}}
        className="glass glow-border"
        style={{position:"relative",zIndex:1,width:"100%",maxWidth:640,maxHeight:"82vh",borderRadius:20,display:"flex",flexDirection:"column",overflow:"hidden"}}>

        {/* ── Header ── */}
        <div style={{padding:"20px 24px 0",display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexShrink:0}}>
          <div style={{flex:1,minWidth:0,paddingRight:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <I.Star size={12} style={{color:"#a855f7"}}/>
              <span className="font-sans" style={{fontSize:10,color:"rgba(168,85,247,.5)",letterSpacing:".15em",textTransform:"uppercase"}}>From the Constellation</span>
            </div>
            {editing
              ? <input value={editTitle} onChange={e=>setEditTitle(e.target.value)}
                  className="input-field font-serif"
                  style={{fontSize:20,padding:"8px 12px",letterSpacing:".02em"}}
                  placeholder="Title…"/>
              : <h2 className="font-serif" style={{fontSize:22,color:"#f3e8ff",lineHeight:1.3}}>{post.title}</h2>
            }
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0,marginTop:4}}>
            {editing ? (
              <>
                <button onClick={saveEdit} title="Save changes"
                  style={{background:"rgba(34,197,94,.15)",border:"1px solid rgba(34,197,94,.35)",borderRadius:8,padding:7,cursor:"pointer",color:"rgba(134,239,172,.7)",display:"flex",transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(34,197,94,.28)";e.currentTarget.style.color="#86efac";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(34,197,94,.15)";e.currentTarget.style.color="rgba(134,239,172,.7)";}}>
                  <I.Check size={14}/>
                </button>
                <button onClick={cancelEdit} title="Cancel"
                  style={{background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.2)",borderRadius:8,padding:7,cursor:"pointer",color:"rgba(192,132,252,.5)",display:"flex"}}>
                  <I.X size={15}/>
                </button>
              </>
            ) : (
              <>
                <button onClick={()=>setEditing(true)} title="Edit this piece"
                  style={{background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.25)",borderRadius:8,padding:7,cursor:"pointer",color:"rgba(192,132,252,.5)",display:"flex",transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(168,85,247,.25)";e.currentTarget.style.color="#c084fc";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(168,85,247,.1)";e.currentTarget.style.color="rgba(192,132,252,.5)";}}>
                  <I.Edit size={14}/>
                </button>
                <button onClick={()=>setCfmP(true)} title="Dissolve this star"
                  style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:8,padding:7,cursor:"pointer",color:"rgba(252,165,165,.45)",display:"flex",transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(239,68,68,.2)";e.currentTarget.style.color="#fca5a5";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(239,68,68,.08)";e.currentTarget.style.color="rgba(252,165,165,.45)";}}>
                  <I.Trash size={14}/>
                </button>
                <button onClick={onClose} style={{background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.2)",borderRadius:8,padding:7,cursor:"pointer",color:"rgba(192,132,252,.5)",display:"flex"}}>
                  <I.X size={15}/>
                </button>
              </>
            )}
          </div>
        </div>

        <div style={{height:1,background:"linear-gradient(90deg,transparent,rgba(168,85,247,.3),transparent)",margin:"16px 24px 0"}}/>

        {/* ── Body ── */}
        <div style={{overflowY:"auto",padding:"20px 24px 0",flex:1}}>
          {editing ? (
            <textarea value={editBody} onChange={e=>setEditBody(e.target.value)}
              className="input-field font-cormorant"
              style={{minHeight:260,resize:"vertical",lineHeight:1.8,fontSize:16,padding:"12px 14px",fontStyle:"normal"}}
              placeholder="Your writing…"/>
          ) : (
            <>
              {post.body.split("\n\n").map((para,i)=>(
                <p key={i} className="font-cormorant"
                  style={{fontSize:17,lineHeight:1.85,color:"rgba(237,233,254,.88)",marginBottom:16,fontStyle:para.startsWith("*")?"italic":"normal"}}>
                  {para.replace(/\*/g,"")}
                </p>
              ))}
            </>
          )}

          {!editing && (
            <AnimatePresence>
              {showEch && (
                <motion.div key="ech" initial={{opacity:0,height:0}} animate={{opacity:1,height:"auto"}} exit={{opacity:0,height:0}} transition={{duration:.3}}>
                  <div style={{borderTop:"1px solid rgba(168,85,247,.15)",marginTop:8,paddingTop:16}}>
                    <p className="font-sans" style={{fontSize:11,color:"rgba(168,85,247,.4)",letterSpacing:".12em",textTransform:"uppercase",marginBottom:14}}>Reflections</p>
                    <div ref={echoEl} style={{display:"flex",flexDirection:"column",gap:10,maxHeight:200,overflowY:"auto",paddingRight:4}}>
                      {post.echoes.length===0&&<p className="font-cormorant" style={{color:"rgba(192,132,252,.3)",fontSize:15,fontStyle:"italic"}}>No reflections yet. Be the first to echo.</p>}
                      <AnimatePresence>
                        {post.echoes.map(e=>(
                          <motion.div key={e.id} initial={{opacity:0,x:-10}} animate={{opacity:1,x:0}} exit={{opacity:0,x:10,scale:.95}} transition={{duration:.2}}
                            className="echo-card" style={{background:"rgba(88,28,135,.15)",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"flex-start",gap:10}}>
                            <p className="font-cormorant" style={{fontSize:15,color:"rgba(237,233,254,.75)",lineHeight:1.6,fontStyle:"italic",flex:1}}>{e.text}</p>
                            <button onClick={()=>setCfmE(e.id)}
                              style={{background:"none",border:"none",cursor:"pointer",color:"rgba(252,165,165,.22)",padding:"2px 0",flexShrink:0,display:"flex",marginTop:2,transition:"color .2s"}}
                              onMouseEnter={ev=>ev.currentTarget.style.color="rgba(252,165,165,.7)"}
                              onMouseLeave={ev=>ev.currentTarget.style.color="rgba(252,165,165,.22)"}>
                              <I.Trash size={12}/>
                            </button>
                          </motion.div>
                        ))}
                      </AnimatePresence>
                    </div>
                    <div style={{display:"flex",gap:8,marginTop:14}}>
                      <input className="input-field" value={draft} onChange={e=>setDraft(e.target.value)} placeholder="Leave a reflection…" style={{fontSize:13}} onKeyDown={e=>e.key==="Enter"&&onAdd()}/>
                      <button onClick={onAdd} style={{background:"rgba(126,34,206,.7)",border:"1px solid rgba(168,85,247,.3)",borderRadius:8,padding:"0 14px",cursor:"pointer",color:"#c084fc",flexShrink:0,display:"flex",alignItems:"center"}}>
                        <I.Send size={14}/>
                      </button>
                    </div>
                  </div>
                </motion.div>
              )}
            </AnimatePresence>
          )}
        </div>

        {/* ── Footer ── */}
        {editing ? (
          <div style={{padding:"14px 24px",borderTop:"1px solid rgba(168,85,247,.1)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <span className="font-sans" style={{fontSize:11,color:"rgba(192,132,252,.35)",fontStyle:"italic"}}>Editing your piece — changes are private until saved.</span>
            <button className="btn-primary" onClick={saveEdit}
              style={{width:"auto",padding:"8px 20px",display:"flex",alignItems:"center",gap:7,fontSize:13}}>
              <I.Check size={13}/> Save
            </button>
          </div>
        ) : (
          <div style={{padding:"16px 24px",borderTop:"1px solid rgba(168,85,247,.1)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <button onClick={()=>setShowEch(!showEch)}
              style={{background:showEch?"rgba(126,34,206,.4)":"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.25)",borderRadius:8,padding:"7px 14px",cursor:"pointer",color:"#c084fc",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500,display:"flex",alignItems:"center",gap:7,transition:"all .2s"}}>
              <I.Msg size={13}/>
              {post.echoes.length} Reflection{post.echoes.length!==1?"s":""}
              <motion.span animate={{rotate:showEch?180:0}} transition={{duration:.2}} style={{display:"inline-flex"}}>
                <I.Chevron size={12}/>
              </motion.span>
            </button>
            <span className="font-sans" style={{fontSize:10,color:"rgba(168,85,247,.22)",letterSpacing:".1em",fontStyle:"italic"}}>voices unnamed</span>
          </div>
        )}

        {/* ── Confirm delete post ── */}
        <AnimatePresence>
          {cfmP&&(
            <motion.div key="cpst" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}
              style={{position:"absolute",inset:0,borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(5,2,15,.88)",backdropFilter:"blur(8px)",zIndex:20}}>
              <motion.div initial={{scale:.9,opacity:0,y:12}} animate={{scale:1,opacity:1,y:0}} exit={{scale:.9,opacity:0}} style={{textAlign:"center",padding:"32px 36px",maxWidth:320}}>
                <motion.div animate={{opacity:[.6,1,.6]}} transition={{duration:2,repeat:Infinity}} style={{display:"flex",justifyContent:"center",marginBottom:16}}>
                  <I.Warn size={28} style={{color:"#f87171"}}/>
                </motion.div>
                <h3 className="font-serif" style={{fontSize:20,color:"#f3e8ff",marginBottom:10}}>Dissolve this Star?</h3>
                <p className="font-cormorant" style={{fontSize:15,color:"rgba(192,132,252,.55)",lineHeight:1.6,marginBottom:24,fontStyle:"italic"}}>
                  This piece of writing will vanish from the constellation, along with all its reflections. This cannot be undone.
                </p>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setCfmP(false)} style={{flex:1,background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.25)",borderRadius:8,padding:"9px 0",cursor:"pointer",color:"rgba(192,132,252,.6)",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:500}}>Keep It</button>
                  <button onClick={()=>onDelPost(post.id)} style={{flex:1,background:"rgba(239,68,68,.2)",border:"1px solid rgba(239,68,68,.35)",borderRadius:8,padding:"9px 0",cursor:"pointer",color:"#fca5a5",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    <I.Trash size={13}/> Dissolve
                  </button>
                </div>
              </motion.div>
            </motion.div>
          )}
        </AnimatePresence>

        {/* ── Confirm delete echo ── */}
        <AnimatePresence>
          {cfmE!==null&&(
            <motion.div key="cech" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}
              style={{position:"absolute",inset:0,borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(5,2,15,.88)",backdropFilter:"blur(8px)",zIndex:20}}>
              <motion.div initial={{scale:.9,opacity:0,y:12}} animate={{scale:1,opacity:1,y:0}} exit={{scale:.9,opacity:0}} style={{textAlign:"center",padding:"28px 32px",maxWidth:300}}>
                <div style={{display:"flex",justifyContent:"center",marginBottom:14}}><I.Trash size={22} style={{color:"rgba(252,165,165,.6)"}}/></div>
                <h3 className="font-serif" style={{fontSize:18,color:"#f3e8ff",marginBottom:8}}>Silence this Reflection?</h3>
                <p className="font-cormorant" style={{fontSize:14,color:"rgba(192,132,252,.5)",lineHeight:1.6,marginBottom:22,fontStyle:"italic"}}>This echo will fade from the piece, permanently.</p>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setCfmE(null)} style={{flex:1,background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.25)",borderRadius:8,padding:"8px 0",cursor:"pointer",color:"rgba(192,132,252,.6)",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500}}>Keep It</button>
                  <button onClick={()=>{onDelEcho(post.id,cfmE);setCfmE(null);}} style={{flex:1,background:"rgba(239,68,68,.18)",border:"1px solid rgba(239,68,68,.3)",borderRadius:8,padding:"8px 0",cursor:"pointer",color:"#fca5a5",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500}}>Silence</button>
                </div>
              </motion.div>
            </motion.div>
          )}
        </AnimatePresence>
      </motion.div>
    </motion.div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
//  UPLOAD / COMPOSE MODAL
// ═══════════════════════════════════════════════════════════════════════════════
function UploadModal({ onSubmit, onClose }) {
  const [title,  setTitle]  = useState("");
  const [body,   setBody]   = useState("");
  const [err,    setErr]    = useState("");
  const [tab,    setTab]    = useState("write"); // "write" | "upload"
  const [drag,   setDrag]   = useState(false);
  const fileRef = useRef(null);

  const readFile = file => {
    if (!file) return;
    if (file.type === "text/plain" || file.name.endsWith(".txt") || file.name.endsWith(".md")) {
      const reader = new FileReader();
      reader.onload = e => {
        const text = e.target.result;
        // Use first non-empty line as title if title is blank
        const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
        if (!title && lines.length) setTitle(lines[0].replace(/^#+ */,""));
        setBody(text);
        setTab("write");
      };
      reader.readAsText(file);
    } else {
      setErr("Please upload a .txt or .md file.");
    }
  };

  const handleDrop = e => {
    e.preventDefault(); setDrag(false);
    readFile(e.dataTransfer.files[0]);
  };

  const submit = () => {
    setErr("");
    if (!title.trim()) { setErr("A title is required before your piece can become a star."); return; }
    if (!body.trim())  { setErr("The body cannot be empty — even a single line will do."); return; }
    onSubmit(title.trim(), body.trim());
  };

  return (
    <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}
      style={{position:"fixed",inset:0,zIndex:110,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>

      <motion.div initial={{backdropFilter:"blur(0px)"}} animate={{backdropFilter:"blur(12px)"}} exit={{backdropFilter:"blur(0px)"}}
        style={{position:"absolute",inset:0,background:"rgba(5,2,15,.85)"}} onClick={onClose}/>

      <motion.div initial={{opacity:0,scale:.92,y:30}} animate={{opacity:1,scale:1,y:0}} exit={{opacity:0,scale:.92,y:30}}
        transition={{type:"spring",damping:28,stiffness:280}}
        className="glass glow-border"
        style={{position:"relative",zIndex:1,width:"100%",maxWidth:640,maxHeight:"88vh",borderRadius:20,display:"flex",flexDirection:"column",overflow:"hidden"}}>

        {/* Header */}
        <div style={{padding:"22px 24px 0",display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexShrink:0}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <I.Feather size={13} style={{color:"#a855f7"}}/>
              <span className="font-sans" style={{fontSize:10,color:"rgba(168,85,247,.5)",letterSpacing:".15em",textTransform:"uppercase"}}>New Piece</span>
            </div>
            <h2 className="font-serif glow-text" style={{fontSize:22,color:"#f3e8ff"}}>Place a New Star</h2>
          </div>
          <button onClick={onClose} style={{background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.2)",borderRadius:8,padding:7,cursor:"pointer",color:"rgba(192,132,252,.5)",display:"flex",marginTop:4}}>
            <I.X size={15}/>
          </button>
        </div>

        <div style={{height:1,background:"linear-gradient(90deg,transparent,rgba(168,85,247,.3),transparent)",margin:"16px 24px 0"}}/>

        {/* Mode tabs */}
        <div style={{display:"flex",background:"rgba(10,5,25,.5)",borderRadius:10,padding:4,margin:"16px 24px 0",border:"1px solid rgba(168,85,247,.12)"}}>
          {[["write","✍  Write"],["upload","⬆  Upload File"]].map(([m,label])=>(
            <button key={m} onClick={()=>setTab(m)}
              style={{flex:1,padding:"8px 0",borderRadius:7,border:"none",cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif",fontWeight:500,color:tab===m?"#f3e8ff":"rgba(192,132,252,.4)",background:tab===m?"rgba(126,34,206,.65)":"transparent",transition:"all .25s"}}>
              {label}
            </button>
          ))}
        </div>

        {/* Body area */}
        <div style={{overflowY:"auto",padding:"16px 24px 0",flex:1,display:"flex",flexDirection:"column",gap:14}}>
          {tab==="write" ? (
            <>
              <div>
                <label className="font-sans" style={{display:"block",fontSize:11,color:"rgba(192,132,252,.45)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>Title</label>
                <input className="input-field font-serif"
                  value={title} onChange={e=>setTitle(e.target.value)}
                  placeholder="What shall this star be called?"
                  style={{fontSize:17,padding:"10px 14px"}}/>
              </div>
              <div style={{flex:1,display:"flex",flexDirection:"column"}}>
                <label className="font-sans" style={{display:"block",fontSize:11,color:"rgba(192,132,252,.45)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>Writing</label>
                <textarea className="input-field font-cormorant"
                  value={body} onChange={e=>setBody(e.target.value)}
                  placeholder="Begin here. The constellation is listening…"
                  style={{flex:1,minHeight:220,resize:"none",lineHeight:1.8,fontSize:16,padding:"12px 14px",fontStyle:"normal"}}/>
              </div>
            </>
          ) : (
            <div
              onDragOver={e=>{e.preventDefault();setDrag(true);}}
              onDragLeave={()=>setDrag(false)}
              onDrop={handleDrop}
              onClick={()=>fileRef.current?.click()}
              style={{
                flex:1, minHeight:240, borderRadius:14, cursor:"pointer", display:"flex", flexDirection:"column",
                alignItems:"center", justifyContent:"center", gap:14, padding:32, transition:"all .2s",
                border: drag ? "2px solid rgba(168,85,247,.7)" : "2px dashed rgba(168,85,247,.3)",
                background: drag ? "rgba(88,28,135,.2)" : "rgba(10,5,25,.4)",
                boxShadow: drag ? "0 0 30px rgba(168,85,247,.2)" : "none",
              }}>
              <input ref={fileRef} type="file" accept=".txt,.md" style={{display:"none"}}
                onChange={e=>readFile(e.target.files[0])}/>
              <motion.div animate={{y:[0,-4,0]}} transition={{duration:2.5,repeat:Infinity,ease:"easeInOut"}}>
                <I.Upload size={36} style={{color:drag?"#c084fc":"rgba(168,85,247,.45)"}}/>
              </motion.div>
              <div style={{textAlign:"center"}}>
                <p className="font-serif" style={{fontSize:16,color:drag?"#e9d5ff":"rgba(192,132,252,.6)",marginBottom:6}}>
                  {drag ? "Release to upload" : "Drop your file here"}
                </p>
                <p className="font-sans" style={{fontSize:12,color:"rgba(168,85,247,.35)"}}>or click to browse · .txt and .md files</p>
              </div>
              {body && (
                <div style={{background:"rgba(88,28,135,.2)",borderRadius:10,padding:"8px 16px",border:"1px solid rgba(168,85,247,.2)"}}>
                  <p className="font-sans" style={{fontSize:12,color:"#c084fc",display:"flex",alignItems:"center",gap:6}}>
                    <I.FileText size={13}/> File loaded — switch to Write tab to preview &amp; edit
                  </p>
                </div>
              )}
            </div>
          )}

          <AnimatePresence>
            {err && <motion.p key="e" initial={{opacity:0,y:-6}} animate={{opacity:1,y:0}} exit={{opacity:0}}
              className="font-sans" style={{color:"#f87171",fontSize:12,textAlign:"center"}}>{err}</motion.p>}
          </AnimatePresence>
        </div>

        {/* Footer */}
        <div style={{padding:"16px 24px",borderTop:"1px solid rgba(168,85,247,.1)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,marginTop:8}}>
          <p className="font-sans" style={{fontSize:11,color:"rgba(192,132,252,.3)",fontStyle:"italic"}}>
            Your piece will appear as a new star in the sky.
          </p>
          <button className="btn-primary" onClick={submit}
            style={{width:"auto",padding:"9px 22px",display:"flex",alignItems:"center",gap:8,fontSize:13}}>
            <I.Star size={13}/> Publish to Constellation
          </button>
        </div>
      </motion.div>
    </motion.div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════════════════════════════════════
function SettingsPage({ info, onBack, onUpdate, onLogout, tab, setTab }) {
  const [dn,setDn] = useState(info?.displayName||"");
  const [pw,setPw] = useState(""); const [pw2,setPw2] = useState("");
  const [ok,setOk] = useState(""); const [er,setEr]  = useState("");

  const save = () => {
    setOk(""); setEr("");
    if(pw&&pw!==pw2){setEr("Passphrases do not match.");return;}
    if(pw&&pw.length<4){setEr("Passphrase must be at least 4 characters.");return;}
    onUpdate(dn,pw); setOk("Your details have been preserved."); setPw(""); setPw2("");
  };

  return (
    <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} transition={{duration:.4}}
      style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>

      <div style={{position:"absolute",inset:0,overflow:"hidden"}}>
        {BG.slice(0,80).map(s=>(
          <div key={s.id} style={{position:"absolute",left:`${s.x}%`,top:`${s.y}%`,width:s.r*1.5,height:s.r*1.5,borderRadius:"50%",background:"white",opacity:s.op*.4}}/>
        ))}
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 80% 80% at 50% 50%,rgba(88,28,135,.2) 0%,transparent 70%)"}}/>
      </div>

      <motion.div initial={{opacity:0,y:30}} animate={{opacity:1,y:0}} transition={{duration:.5}}
        className="glass glow-border" style={{width:440,borderRadius:20,padding:"32px 32px 28px",position:"relative",zIndex:10}}>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:28}}>
          <div>
            <h2 className="font-serif glow-text" style={{fontSize:24,color:"#f3e8ff"}}>Sanctum</h2>
            <p className="font-sans" style={{fontSize:11,color:"rgba(192,132,252,.4)",letterSpacing:".1em",textTransform:"uppercase",marginTop:2}}>Your Private Settings</p>
          </div>
          <button onClick={onBack} style={{background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.2)",borderRadius:8,padding:7,cursor:"pointer",color:"rgba(192,132,252,.5)",display:"flex"}}>
            <I.X size={15}/>
          </button>
        </div>

        <div style={{display:"flex",gap:6,marginBottom:24}}>
          {["profile","security"].map(t=>(
            <button key={t} onClick={()=>setTab(t)}
              style={{padding:"6px 16px",borderRadius:8,border:`1px solid ${tab===t?"rgba(168,85,247,.4)":"rgba(168,85,247,.15)"}`,background:tab===t?"rgba(126,34,206,.35)":"transparent",color:tab===t?"#c084fc":"rgba(192,132,252,.35)",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500,cursor:"pointer",transition:"all .2s",textTransform:"capitalize"}}>
              {t}
            </button>
          ))}
        </div>

        <AnimatePresence mode="wait">
          {tab==="profile"&&(
            <motion.div key="p" initial={{opacity:0,x:-10}} animate={{opacity:1,x:0}} exit={{opacity:0,x:10}} style={{display:"flex",flexDirection:"column",gap:16}}>
              <div style={{background:"rgba(88,28,135,.15)",borderRadius:12,padding:"14px 16px",border:"1px solid rgba(168,85,247,.15)"}}>
                <p className="font-sans" style={{fontSize:10,color:"rgba(192,132,252,.35)",letterSpacing:".12em",textTransform:"uppercase",marginBottom:4}}>Display Name</p>
                <p className="font-serif" style={{fontSize:16,color:"#e9d5ff"}}>{info?.displayName||"Anonymous Wanderer"}</p>
                <p className="font-sans" style={{fontSize:10,color:"rgba(168,85,247,.3)",marginTop:4,fontStyle:"italic"}}>Never visible on your stars or reflections</p>
              </div>
              <div>
                <label className="font-sans" style={{display:"block",fontSize:11,color:"rgba(192,132,252,.45)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>Update Display Name</label>
                <input className="input-field" value={dn} onChange={e=>setDn(e.target.value)} placeholder="How you see yourself…"/>
              </div>
            </motion.div>
          )}
          {tab==="security"&&(
            <motion.div key="s" initial={{opacity:0,x:10}} animate={{opacity:1,x:0}} exit={{opacity:0,x:-10}} style={{display:"flex",flexDirection:"column",gap:14}}>
              <div>
                <label className="font-sans" style={{display:"block",fontSize:11,color:"rgba(192,132,252,.45)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>New Passphrase</label>
                <input className="input-field" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Leave blank to keep current"/>
              </div>
              <div>
                <label className="font-sans" style={{display:"block",fontSize:11,color:"rgba(192,132,252,.45)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>Confirm Passphrase</label>
                <input className="input-field" type="password" value={pw2} onChange={e=>setPw2(e.target.value)} placeholder="Confirm your new passphrase"/>
              </div>
            </motion.div>
          )}
        </AnimatePresence>

        <AnimatePresence>
          {(ok||er)&&<motion.p key="fb" initial={{opacity:0,y:-6}} animate={{opacity:1,y:0}} exit={{opacity:0}}
            className="font-sans" style={{fontSize:12,color:ok?"#86efac":"#f87171",textAlign:"center",marginTop:14}}>{ok||er}</motion.p>}
        </AnimatePresence>

        <div style={{marginTop:22,display:"flex",flexDirection:"column",gap:10}}>
          <button className="btn-primary" onClick={save} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,height:40}}>
            <I.Sparkle size={13}/> Preserve Changes
          </button>
          <button onClick={onLogout}
            style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.2)",color:"rgba(252,165,165,.6)",padding:"9px 0",borderRadius:8,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:7,transition:"all .2s"}}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(239,68,68,.2)";e.currentTarget.style.color="#fca5a5";}}
            onMouseLeave={e=>{e.currentTarget.style.background="rgba(239,68,68,.1)";e.currentTarget.style.color="rgba(252,165,165,.6)";}}>
            <I.LogOut size={13}/> Depart the Circle
          </button>
        </div>
      </motion.div>
    </motion.div>
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
