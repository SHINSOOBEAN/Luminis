  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #080613; }

    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(168,85,247,.3); border-radius: 2px; }

    .font-serif      { font-family: 'Playfair Display', Georgia, serif; }
    .font-cormorant  { font-family: 'Cormorant Garamond', Georgia, serif; }
    .font-sans       { font-family: 'DM Sans', sans-serif; }

    .glass {
      background: rgba(15,8,35,.65);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(168,85,247,.18);
    }
    .glow-text   { text-shadow: 0 0 20px rgba(192,132,252,.6); }
    .glow-border { box-shadow: 0 0 0 1px rgba(168,85,247,.3), 0 0 30px rgba(168,85,247,.1); }

    .input-field {
      background: rgba(10,5,25,.7);
      border: 1px solid rgba(168,85,247,.2);
      color: #e9d5ff;
      border-radius: 8px;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-field:focus        { border-color: rgba(168,85,247,.6); box-shadow: 0 0 0 3px rgba(168,85,247,.1); }
    .input-field::placeholder { color: rgba(192,132,252,.3); }

    .btn-primary {
      background: linear-gradient(135deg,rgba(126,34,206,.9),rgba(109,40,217,.8));
      border: 1px solid rgba(168,85,247,.4);
      color: #f3e8ff;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .03em;
      transition: all .2s;
      width: 100%;
    }
    .btn-primary:hover { background: linear-gradient(135deg,rgba(147,51,234,.9),rgba(126,34,206,.8)); box-shadow: 0 0 20px rgba(168,85,247,.3); }

    .echo-card { filter: drop-shadow(0 0 8px rgba(168,85,247,.5)); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; display: inline-block; }

    /* Setup overlay */
    #setup-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #080613;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }
    .setup-card {
      background: rgba(15,8,35,.95);
      border: 1px solid rgba(168,85,247,.3);
      box-shadow: 0 0 60px rgba(168,85,247,.15);
      border-radius: 20px;
      padding: 40px 44px;
      max-width: 560px;
      width: 90%;
    }
    .setup-input {
      background: rgba(10,5,25,.8);
      border: 1px solid rgba(168,85,247,.25);
      color: #e9d5ff;
      border-radius: 8px;
      padding: 9px 13px;
      width: 100%;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      margin-bottom: 10px;
      transition: border-color .2s;
    }
    .setup-input:focus { border-color: rgba(168,85,247,.6); }
    .setup-input::placeholder { color: rgba(192,132,252,.3); }
    .step { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; }
    .step-num {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      background: rgba(126,34,206,.5); border: 1px solid rgba(168,85,247,.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: #c084fc; margin-top: 1px;
    }
    .step-text { font-size: 13px; color: rgba(192,132,252,.75); line-height: 1.6; }
    .step-text a { color: #c084fc; }
    .step-text code {
      background: rgba(88,28,135,.3); padding: 1px 6px; border-radius: 4px;
      font-family: monospace; font-size: 12px; color: #e9d5ff;
    }
  </style>

function App() {
  const [fbReady,  setFbReady]  = useState(window.FIREBASE_READY);
  const [authUser, setAuthUser] = useState(null);  // Firebase auth user
  const [profile,  setProfile]  = useState(null);  // { displayName } from Firestore
  const [posts,    setPosts]    = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [view,     setView]     = useState("gate");
  const [picked,   setPicked]   = useState(null);
  const [showEch,  setShowEch]  = useState(false);
  const [draft,    setDraft]    = useState("");
  const [sTab,     setSTab]     = useState("profile");
  const [aMode,    setAMode]    = useState("login");
  const [showUpload,setShowUpload]=useState(false);
  const [online,   setOnline]   = useState(true);

  // Check for saved Firebase config in localStorage
  useEffect(() => {
    if (!fbReady) {
      try {
        const saved = localStorage.getItem("luminis_fb_cfg");
        if (saved) {
          const cfg = JSON.parse(saved);
          if (cfg.apiKey && !cfg.apiKey.startsWith("REPLACE_")) {
            if (!firebase.apps.length) firebase.initializeApp(cfg);
            window.__DB__   = firebase.firestore();
            window.__AUTH__ = firebase.auth();
            window.FIREBASE_READY = true;
            setFbReady(true);
          }
        }
      } catch {}
    }
  }, []);

  // Auth listener
  useEffect(() => {
    if (!fbReady) return;
    const unsub = AUTH().onAuthStateChanged(async user => {
      setAuthUser(user);
      if (user) {
        setView("constellation");
        // Load profile doc
        const snap = await DB().collection("users").doc(user.uid).get();
        if (snap.exists) setProfile(snap.data());
        else setProfile({ displayName: "Anonymous Wanderer" });
      } else {
        setView("gate");
        setProfile(null);
      }
      setLoading(false);
    });
    return unsub;
  }, [fbReady]);

  // Real-time posts listener
  useEffect(() => {
    if (!fbReady || !authUser) return;
    const unsub = DB().collection("posts")
      .orderBy("createdAt", "asc")
      .onSnapshot(snap => {
        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        setPosts(data);
        // If we currently have a modal open, keep it in sync
        setPicked(prev => prev ? (data.find(p => p.id === prev.id) || null) : null);
      }, () => setOnline(false));
    setOnline(true);
    return unsub;
  }, [fbReady, authUser]);

  // Seed Firestore with demo posts on very first launch
  useEffect(() => {
    if (!fbReady || !authUser) return;
    DB().collection("posts").limit(1).get().then(snap => {
      if (snap.empty) {
        const batch = DB().batch();
        SEED_POSTS.forEach(p => {
          const ref = DB().collection("posts").doc();
          batch.set(ref, { ...p, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        });
        batch.commit();
      }
    });
  }, [fbReady, authUser]);

  // ── Auth actions ───────────────────────────────────────────────────────────
  const doLogin = async (email, pw) => {
    try {
      await AUTH().signInWithEmailAndPassword(email, pw);
      return null;
    } catch (e) {
      if (e.code === "auth/user-not-found" || e.code === "auth/wrong-password" || e.code === "auth/invalid-credential")
        return "Invalid credentials. The gate remains closed.";
      return e.message;
    }
  };

  const doSignup = async (email, pw, displayName) => {
    try {
      const cred = await AUTH().createUserWithEmailAndPassword(email, pw);
      const dn = displayName.trim() || "Anonymous Wanderer";
      await DB().collection("users").doc(cred.user.uid).set({ displayName: dn, email });
      setProfile({ displayName: dn });
      return null;
    } catch (e) {
      if (e.code === "auth/email-already-in-use") return "This address is already claimed by another wanderer.";
      if (e.code === "auth/weak-password")        return "Passphrase must be at least 6 characters.";
      return e.message;
    }
  };

  const doLogout = () => { AUTH().signOut(); setPicked(null); };

  // ── Post / Echo actions ────────────────────────────────────────────────────
  const addEcho = async () => {
    if (!draft.trim() || !picked) return;
    const echo = { id: `e${Date.now()}`, text: draft.trim() };
    await DB().collection("posts").doc(picked.id).update({
      echoes: firebase.firestore.FieldValue.arrayUnion(echo)
    });
    setDraft("");
  };

  const delPost = async (id) => {
    await DB().collection("posts").doc(id).delete();
    setPicked(null); setShowEch(false);
  };

  const delEcho = async (postId, echoId) => {
    const post = posts.find(p => p.id === postId);
    if (!post) return;
    const updated = post.echoes.filter(e => e.id !== echoId);
    await DB().collection("posts").doc(postId).update({ echoes: updated });
  };

  const addPost = async (title, body) => {
    await DB().collection("posts").add({
      title, body, echoes: [],
      x: 8 + Math.random() * 84,
      y: 8 + Math.random() * 84,
      size: 1.8 + Math.random() * 1.6,
      bright: 0.7 + Math.random() * 0.3,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    setShowUpload(false);
  };

  const updatePost = async (id, title, body) => {
    await DB().collection("posts").doc(id).update({ title, body });
  };

  const updateProfile = async (displayName, newPw) => {
    if (displayName && authUser) {
      await DB().collection("users").doc(authUser.uid).set({ displayName, email: authUser.email }, { merge: true });
      setProfile(p => ({ ...p, displayName }));
    }
    if (newPw) {
      try { await authUser.updatePassword(newPw); }
      catch(e) { return e.message; }
    }
    return null;
  };

  // ── Not configured yet ─────────────────────────────────────────────────────
  if (!fbReady) return <SetupOverlay />;

  // ── Loading spinner ────────────────────────────────────────────────────────
  if (loading) return (
    <div style={{width:"100vw",height:"100vh",background:"#080613",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <motion.div animate={{opacity:[.4,1,.4]}} transition={{duration:2,repeat:Infinity}}>
        <I.Sparkle size={32} style={{color:"#c084fc"}}/>
      </motion.div>
      <p className="font-sans" style={{color:"rgba(192,132,252,.4)",fontSize:12,letterSpacing:".15em",textTransform:"uppercase"}}>Entering the Constellation…</p>
    </div>
  );

  return (
    <div style={{width:"100vw",height:"100vh",overflow:"hidden",background:"#080613",position:"relative"}}>
      {/* Online indicator */}
      <div style={{position:"fixed",bottom:16,left:16,zIndex:200,display:"flex",alignItems:"center",gap:6,
        background:"rgba(15,8,35,.8)",border:`1px solid ${online?"rgba(134,239,172,.2)":"rgba(239,68,68,.2)"}`,
        borderRadius:20,padding:"5px 11px",backdropFilter:"blur(8px)"}}>
        {online
          ? <><I.Wifi size={11} style={{color:"rgba(134,239,172,.6)"}}/><span className="font-sans" style={{fontSize:10,color:"rgba(134,239,172,.5)",letterSpacing:".08em"}}>Live</span></>
          : <><I.WifiOff size={11} style={{color:"rgba(252,165,165,.6)"}}/><span className="font-sans" style={{fontSize:10,color:"rgba(252,165,165,.5)",letterSpacing:".08em"}}>Offline</span></>
        }
      </div>

      <AnimatePresence mode="wait">
        {view==="gate"          && <GatePage     key="gate"     onLogin={doLogin} onSignup={doSignup} aMode={aMode} setAMode={setAMode} />}
        {view==="constellation" && <MapPage      key="map"      posts={posts} onPick={p=>{setPicked(p);setShowEch(false);}} onSettings={()=>setView("settings")} onNew={()=>setShowUpload(true)} />}
        {view==="settings"      && <SettingsPage key="settings" profile={profile} onBack={()=>setView("constellation")} onUpdate={updateProfile} onLogout={doLogout} tab={sTab} setTab={setSTab} />}
      </AnimatePresence>

      <AnimatePresence>
        {picked && <Modal post={picked} showEch={showEch} setShowEch={setShowEch} draft={draft} setDraft={setDraft}
          onAdd={addEcho} onDelPost={delPost} onDelEcho={delEcho} onUpdate={updatePost}
          onClose={()=>{setPicked(null);setShowEch(false);}} />}
      </AnimatePresence>
      <AnimatePresence>
        {showUpload && <UploadModal onSubmit={addPost} onClose={()=>setShowUpload(false)} />}
      </AnimatePresence>
    </div>
  );
}

        <div style={{textAlign:"center",marginBottom:32}}>

function StarDot({ post, delay, onClick }) {
  const [hov,setHov] = useState(false);
  return (
    <motion.div initial={{opacity:0,scale:0}} animate={{opacity:1,scale:1}} transition={{delay,duration:.6,ease:[.34,1.56,.64,1]}}
      style={{position:"absolute",left:`${post.x}%`,top:`${post.y}%`,zIndex:5,cursor:"pointer"}}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={onClick}>
      <AnimatePresence>
        {hov&&<motion.div key="r" initial={{scale:.5,opacity:0}} animate={{scale:1,opacity:1}} exit={{scale:.5,opacity:0}}
          style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:post.size*40,height:post.size*40,borderRadius:"50%",background:"radial-gradient(circle,rgba(168,85,247,.25) 0%,transparent 70%)",pointerEvents:"none"}}/>}
      </AnimatePresence>
      <motion.div
        animate={{scale:[1,1.15,1],opacity:[post.bright*.8,post.bright,post.bright*.8]}}
        transition={{duration:2.5+((post.x+post.y)%5)*.3,repeat:Infinity,ease:"easeInOut"}}
        style={{width:post.size*10,height:post.size*10,borderRadius:"50%",
          background:`radial-gradient(circle,rgba(245,208,254,${post.bright}) 0%,rgba(168,85,247,${post.bright*.6}) 50%,transparent 70%)`,
          filter:`drop-shadow(0 0 ${post.size*4}px rgba(192,132,252,${post.bright*.9}))`}}/>
      <AnimatePresence>
        {hov&&<motion.div key="t" initial={{opacity:0,y:6,scale:.95}} animate={{opacity:1,y:0,scale:1}} exit={{opacity:0,y:6,scale:.95}} transition={{duration:.15}}
          className="glass"
          style={{position:"absolute",top:"100%",left:"50%",transform:"translateX(-50%)",marginTop:10,padding:"8px 12px",borderRadius:8,whiteSpace:"nowrap",pointerEvents:"none",zIndex:20}}>
          <p className="font-serif"  style={{fontSize:12,color:"#e9d5ff"}}>{post.title}</p>
          <p className="font-sans"   style={{fontSize:10,color:"rgba(192,132,252,.45)",marginTop:2}}>{(post.echoes||[]).length} reflection{(post.echoes||[]).length!==1?"s":""}</p>
        </motion.div>}
      </AnimatePresence>
    </motion.div>
  );
}

function Modal({ post, showEch, setShowEch, draft, setDraft, onAdd, onDelPost, onDelEcho, onUpdate, onClose }) {
  const echoEl = useRef(null);
  const [cfmP,   setCfmP]    = useState(false);

  const [editing,setEditing] = useState(false);
  const [eTitle, setETitle]  = useState(post.title);
  const [eBody,  setEBody]   = useState(post.body);
  const [saving, setSaving]  = useState(false);

  useEffect(()=>{ setETitle(post.title); setEBody(post.body); },[post.id]);
  useEffect(()=>{
    if(showEch&&echoEl.current) setTimeout(()=>echoEl.current?.scrollTo({top:echoEl.current.scrollHeight,behavior:"smooth"}),100);

                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(34,197,94,.28)";e.currentTarget.style.color="#86efac";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(34,197,94,.15)";e.currentTarget.style.color="rgba(134,239,172,.7)";}}>

                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(168,85,247,.1)";e.currentTarget.style.color="rgba(192,132,252,.5)";}}>
                  <I.Edit size={14}/>
                </button>
                <button onClick={()=>setCfmP(true)}
                  style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:8,padding:7,cursor:"pointer",color:"rgba(252,165,165,.45)",display:"flex",transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(239,68,68,.2)";e.currentTarget.style.color="#fca5a5";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(239,68,68,.08)";e.currentTarget.style.color="rgba(252,165,165,.45)";}}>
                  <I.Trash size={14}/>
                </button>
                <button onClick={onClose} style={{background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.2)",borderRadius:8,padding:7,cursor:"pointer",color:"rgba(192,132,252,.5)",display:"flex"}}>
                  <I.X size={15}/>
                </button>

            )}

        </div>

        <div style={{height:1,background:"linear-gradient(90deg,transparent,rgba(168,85,247,.3),transparent)",margin:"16px 24px 0"}}/>

        {/* Body */}
        <div style={{overflowY:"auto",padding:"20px 24px 0",flex:1}}>
          {editing
            ? <textarea value={eBody} onChange={e=>setEBody(e.target.value)} className="input-field font-cormorant"
                style={{minHeight:260,resize:"vertical",lineHeight:1.8,fontSize:16,padding:"12px 14px"}} placeholder="Your writing…"/>
            : post.body.split("\n\n").map((para,i)=>(
                <p key={i} className="font-cormorant"
                  style={{fontSize:17,lineHeight:1.85,color:"rgba(237,233,254,.88)",marginBottom:16,fontStyle:para.startsWith("*")?"italic":"normal"}}>
                  {para.replace(/\*/g,"")}
                </p>
              ))
          }

          {!editing && (
            <AnimatePresence>
              {showEch && (
                <motion.div key="ech" initial={{opacity:0,height:0}} animate={{opacity:1,height:"auto"}} exit={{opacity:0,height:0}} transition={{duration:.3}}>
                  <div style={{borderTop:"1px solid rgba(168,85,247,.15)",marginTop:8,paddingTop:16}}>
                    <p className="font-sans" style={{fontSize:11,color:"rgba(168,85,247,.4)",letterSpacing:".12em",textTransform:"uppercase",marginBottom:14}}>Reflections</p>
                    <div ref={echoEl} style={{display:"flex",flexDirection:"column",gap:10,maxHeight:200,overflowY:"auto",paddingRight:4}}>
                      {echoes.length===0&&<p className="font-cormorant" style={{color:"rgba(192,132,252,.3)",fontSize:15,fontStyle:"italic"}}>No reflections yet. Be the first to echo.</p>}
                      <AnimatePresence>
                        {echoes.map(e=>(
                          <motion.div key={e.id} initial={{opacity:0,x:-10}} animate={{opacity:1,x:0}} exit={{opacity:0,x:10,scale:.95}} transition={{duration:.2}}
                            className="echo-card" style={{background:"rgba(88,28,135,.15)",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"flex-start",gap:10}}>
                            <p className="font-cormorant" style={{fontSize:15,color:"rgba(237,233,254,.75)",lineHeight:1.6,fontStyle:"italic",flex:1}}>{e.text}</p>
                            <button onClick={()=>setCfmE(e.id)}
                              style={{background:"none",border:"none",cursor:"pointer",color:"rgba(252,165,165,.22)",padding:"2px 0",flexShrink:0,display:"flex",marginTop:2,transition:"color .2s"}}
                              onMouseEnter={ev=>ev.currentTarget.style.color="rgba(252,165,165,.7)"}
                              onMouseLeave={ev=>ev.currentTarget.style.color="rgba(252,165,165,.22)"}>
                              <I.Trash size={12}/>
                            </button>
                          </motion.div>
                        ))}
                      </AnimatePresence>
                    </div>
                    <div style={{display:"flex",gap:8,marginTop:14}}>
                      <input className="input-field" value={draft} onChange={e=>setDraft(e.target.value)} placeholder="Leave a reflection…" style={{fontSize:13}} onKeyDown={e=>e.key==="Enter"&&onAdd()}/>
                      <button onClick={onAdd} style={{background:"rgba(126,34,206,.7)",border:"1px solid rgba(168,85,247,.3)",borderRadius:8,padding:"0 14px",cursor:"pointer",color:"#c084fc",flexShrink:0,display:"flex",alignItems:"center"}}>
                        <I.Send size={14}/>
                      </button>
                    </div>
                  </div>
                </motion.div>
              )}
            </AnimatePresence>
          )}
        </div>

        {/* Footer */}
        {editing ? (
          <div style={{padding:"14px 24px",borderTop:"1px solid rgba(168,85,247,.1)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <span className="font-sans" style={{fontSize:11,color:"rgba(192,132,252,.35)",fontStyle:"italic"}}>Changes sync to all members instantly.</span>
            <button className="btn-primary" onClick={saveEdit} disabled={saving}
              style={{width:"auto",padding:"8px 20px",display:"flex",alignItems:"center",gap:7,fontSize:13,opacity:saving?.7:1}}>
              <I.Check size={13}/> {saving?"Saving…":"Save"}
            </button>
          </div>
        ) : (
          <div style={{padding:"16px 24px",borderTop:"1px solid rgba(168,85,247,.1)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <button onClick={()=>setShowEch(!showEch)}
              style={{background:showEch?"rgba(126,34,206,.4)":"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.25)",borderRadius:8,padding:"7px 14px",cursor:"pointer",color:"#c084fc",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500,display:"flex",alignItems:"center",gap:7,transition:"all .2s"}}>
              <I.Msg size={13}/>
              {echoes.length} Reflection{echoes.length!==1?"s":""}
              <motion.span animate={{rotate:showEch?180:0}} transition={{duration:.2}} style={{display:"inline-flex"}}>
                <I.Chevron size={12}/>
              </motion.span>
            </button>
            <span className="font-sans" style={{fontSize:10,color:"rgba(168,85,247,.22)",letterSpacing:".1em",fontStyle:"italic"}}>voices unnamed</span>
          </div>
        )}

        {/* Confirm delete post */}
        <AnimatePresence>
          {cfmP&&(
            <motion.div key="cpst" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}
              style={{position:"absolute",inset:0,borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(5,2,15,.88)",backdropFilter:"blur(8px)",zIndex:20}}>
              <motion.div initial={{scale:.9,opacity:0,y:12}} animate={{scale:1,opacity:1,y:0}} exit={{scale:.9,opacity:0}} style={{textAlign:"center",padding:"32px 36px",maxWidth:320}}>
                <motion.div animate={{opacity:[.6,1,.6]}} transition={{duration:2,repeat:Infinity}} style={{display:"flex",justifyContent:"center",marginBottom:16}}>
                  <I.Warn size={28} style={{color:"#f87171"}}/>
                </motion.div>
                <h3 className="font-serif" style={{fontSize:20,color:"#f3e8ff",marginBottom:10}}>Dissolve this Star?</h3>
                <p className="font-cormorant" style={{fontSize:15,color:"rgba(192,132,252,.55)",lineHeight:1.6,marginBottom:24,fontStyle:"italic"}}>
                  This piece will vanish from the constellation for everyone, along with all its reflections. This cannot be undone.
                </p>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setCfmP(false)} style={{flex:1,background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.25)",borderRadius:8,padding:"9px 0",cursor:"pointer",color:"rgba(192,132,252,.6)",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:500}}>Keep It</button>
                  <button onClick={()=>onDelPost(post.id)} style={{flex:1,background:"rgba(239,68,68,.2)",border:"1px solid rgba(239,68,68,.35)",borderRadius:8,padding:"9px 0",cursor:"pointer",color:"#fca5a5",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    <I.Trash size={13}/> Dissolve
                  </button>
                </div>
              </motion.div>
            </motion.div>
          )}
        </AnimatePresence>

        {/* Confirm delete echo */}
        <AnimatePresence>
          {cfmE!==null&&(
            <motion.div key="cech" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}
              style={{position:"absolute",inset:0,borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(5,2,15,.88)",backdropFilter:"blur(8px)",zIndex:20}}>
              <motion.div initial={{scale:.9,opacity:0,y:12}} animate={{scale:1,opacity:1,y:0}} exit={{scale:.9,opacity:0}} style={{textAlign:"center",padding:"28px 32px",maxWidth:300}}>
                <div style={{display:"flex",justifyContent:"center",marginBottom:14}}><I.Trash size={22} style={{color:"rgba(252,165,165,.6)"}}/></div>
                <h3 className="font-serif" style={{fontSize:18,color:"#f3e8ff",marginBottom:8}}>Silence this Reflection?</h3>
                <p className="font-cormorant" style={{fontSize:14,color:"rgba(192,132,252,.5)",lineHeight:1.6,marginBottom:22,fontStyle:"italic"}}>This echo will fade for all members, permanently.</p>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setCfmE(null)} style={{flex:1,background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.25)",borderRadius:8,padding:"8px 0",cursor:"pointer",color:"rgba(192,132,252,.6)",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500}}>Keep It</button>
                  <button onClick={()=>{onDelEcho(post.id,cfmE);setCfmE(null);}} style={{flex:1,background:"rgba(239,68,68,.18)",border:"1px solid rgba(239,68,68,.3)",borderRadius:8,padding:"8px 0",cursor:"pointer",color:"#fca5a5",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500}}>Silence</button>
                </div>
              </motion.div>
            </motion.div>
          )}
        </AnimatePresence>
      </motion.div>
    </motion.div>
  );
}

//  UPLOAD / COMPOSE MODAL
// ══════════════════════════════════════════════════════════════════════════════
function UploadModal({ onSubmit, onClose }) {
  const [title,  setTitle]  = useState("");
  const [body,   setBody]   = useState("");
  const [err,    setErr]    = useState("");
  const [tab,    setTab]    = useState("write");
  const [drag,   setDrag]   = useState(false);
  const [busy,   setBusy]   = useState(false);
  const fileRef = useRef(null);

  const readFile = file => {
    if (!file) return;
    if (file.type==="text/plain"||file.name.endsWith(".txt")||file.name.endsWith(".md")) {
      const r = new FileReader();
      r.onload = e => {
        const text = e.target.result;
        const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
        if (!title && lines.length) setTitle(lines[0].replace(/^#+ */,""));
        setBody(text); setTab("write");
      };
      r.readAsText(file);
    } else { setErr("Please upload a .txt or .md file."); }
  };

  const submit = async () => {
    setErr("");
    if (!title.trim()) { setErr("A title is required before your piece can become a star."); return; }
    if (!body.trim())  { setErr("The body cannot be empty — even a single line will do."); return; }
    setBusy(true);
    await onSubmit(title.trim(), body.trim());
    setBusy(false);
  };

  return (
    <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}
      style={{position:"fixed",inset:0,zIndex:110,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <motion.div initial={{backdropFilter:"blur(0px)"}} animate={{backdropFilter:"blur(12px)"}} exit={{backdropFilter:"blur(0px)"}}
        style={{position:"absolute",inset:0,background:"rgba(5,2,15,.85)"}} onClick={onClose}/>
      <motion.div initial={{opacity:0,scale:.92,y:30}} animate={{opacity:1,scale:1,y:0}} exit={{opacity:0,scale:.92,y:30}}
        transition={{type:"spring",damping:28,stiffness:280}}
        className="glass glow-border"
        style={{position:"relative",zIndex:1,width:"100%",maxWidth:640,maxHeight:"88vh",borderRadius:20,display:"flex",flexDirection:"column",overflow:"hidden"}}>

        <div style={{padding:"22px 24px 0",display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexShrink:0}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <I.Feather size={13} style={{color:"#a855f7"}}/>
              <span className="font-sans" style={{fontSize:10,color:"rgba(168,85,247,.5)",letterSpacing:".15em",textTransform:"uppercase"}}>New Piece</span>
            </div>
            <h2 className="font-serif glow-text" style={{fontSize:22,color:"#f3e8ff"}}>Place a New Star</h2>
          </div>
          <button onClick={onClose} style={{background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.2)",borderRadius:8,padding:7,cursor:"pointer",color:"rgba(192,132,252,.5)",display:"flex",marginTop:4}}>
            <I.X size={15}/>
          </button>
        </div>

        <div style={{height:1,background:"linear-gradient(90deg,transparent,rgba(168,85,247,.3),transparent)",margin:"16px 24px 0"}}/>

        <div style={{display:"flex",background:"rgba(10,5,25,.5)",borderRadius:10,padding:4,margin:"16px 24px 0",border:"1px solid rgba(168,85,247,.12)"}}>
          {[["write","✍  Write"],["upload","⬆  Upload File"]].map(([m,label])=>(
            <button key={m} onClick={()=>setTab(m)}
              style={{flex:1,padding:"8px 0",borderRadius:7,border:"none",cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif",fontWeight:500,color:tab===m?"#f3e8ff":"rgba(192,132,252,.4)",background:tab===m?"rgba(126,34,206,.65)":"transparent",transition:"all .25s"}}>
              {label}
            </button>
          ))}
        </div>

        <div style={{overflowY:"auto",padding:"16px 24px 0",flex:1,display:"flex",flexDirection:"column",gap:14}}>
          {tab==="write" ? (
            <>
              <div>
                <label className="font-sans" style={{display:"block",fontSize:11,color:"rgba(192,132,252,.45)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>Title</label>
                <input className="input-field font-serif" value={title} onChange={e=>setTitle(e.target.value)} placeholder="What shall this star be called?" style={{fontSize:17,padding:"10px 14px"}}/>
              </div>
              <div style={{flex:1,display:"flex",flexDirection:"column"}}>
                <label className="font-sans" style={{display:"block",fontSize:11,color:"rgba(192,132,252,.45)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>Writing</label>
                <textarea className="input-field font-cormorant" value={body} onChange={e=>setBody(e.target.value)}
                  placeholder="Begin here. The constellation is listening…"
                  style={{flex:1,minHeight:220,resize:"none",lineHeight:1.8,fontSize:16,padding:"12px 14px"}}/>
              </div>
            </>
          ) : (
            <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
              onDrop={e=>{e.preventDefault();setDrag(false);readFile(e.dataTransfer.files[0]);}}
              onClick={()=>fileRef.current?.click()}
              style={{flex:1,minHeight:240,borderRadius:14,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:32,transition:"all .2s",
                border:drag?"2px solid rgba(168,85,247,.7)":"2px dashed rgba(168,85,247,.3)",
                background:drag?"rgba(88,28,135,.2)":"rgba(10,5,25,.4)",
                boxShadow:drag?"0 0 30px rgba(168,85,247,.2)":"none"}}>
              <input ref={fileRef} type="file" accept=".txt,.md" style={{display:"none"}} onChange={e=>readFile(e.target.files[0])}/>
              <motion.div animate={{y:[0,-4,0]}} transition={{duration:2.5,repeat:Infinity,ease:"easeInOut"}}>
                <I.Upload size={36} style={{color:drag?"#c084fc":"rgba(168,85,247,.45)"}}/>
              </motion.div>
              <div style={{textAlign:"center"}}>
                <p className="font-serif" style={{fontSize:16,color:drag?"#e9d5ff":"rgba(192,132,252,.6)",marginBottom:6}}>{drag?"Release to upload":"Drop your file here"}</p>
                <p className="font-sans" style={{fontSize:12,color:"rgba(168,85,247,.35)"}}>or click to browse · .txt and .md files</p>
              </div>
              {body&&<div style={{background:"rgba(88,28,135,.2)",borderRadius:10,padding:"8px 16px",border:"1px solid rgba(168,85,247,.2)"}}>
                <p className="font-sans" style={{fontSize:12,color:"#c084fc",display:"flex",alignItems:"center",gap:6}}>
                  <I.FileText size={13}/> File loaded — switch to Write tab to preview &amp; edit
                </p>
              </div>}
            </div>
          )}
          <AnimatePresence>
            {err&&<motion.p key="e" initial={{opacity:0,y:-6}} animate={{opacity:1,y:0}} exit={{opacity:0}}
              className="font-sans" style={{color:"#f87171",fontSize:12,textAlign:"center"}}>{err}</motion.p>}
          </AnimatePresence>
        </div>

        <div style={{padding:"16px 24px",borderTop:"1px solid rgba(168,85,247,.1)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,marginTop:8}}>
          <p className="font-sans" style={{fontSize:11,color:"rgba(192,132,252,.3)",fontStyle:"italic"}}>Visible to all members instantly.</p>
          <button className="btn-primary" onClick={submit} disabled={busy}
            style={{width:"auto",padding:"9px 22px",display:"flex",alignItems:"center",gap:8,fontSize:13,opacity:busy?.7:1}}>
            {busy?<span className="spin"><I.Sparkle size={13}/></span>:<I.Star size={13}/>} {busy?"Publishing…":"Publish to Constellation"}
          </button>
        </div>
      </motion.div>
    </motion.div>
  );
}

//  SETTINGS PAGE
// ══════════════════════════════════════════════════════════════════════════════
function SettingsPage({ profile, onBack, onUpdate, onLogout, tab, setTab }) {
  const [dn,  setDn]  = useState(profile?.displayName||"");
  const [pw,  setPw]  = useState("");
  const [pw2, setPw2] = useState("");
  const [ok,  setOk]  = useState("");
  const [er,  setEr]  = useState("");
  const [busy,setBusy]= useState(false);

  const save = async () => {
    setOk(""); setEr("");
    if (pw && pw!==pw2) { setEr("Passphrases do not match."); return; }
    if (pw && pw.length<6) { setEr("Passphrase must be at least 6 characters."); return; }
    setBusy(true);
    const err = await onUpdate(dn, pw);
    setBusy(false);
    if (err) setEr(err);
    else { setOk("Your details have been preserved."); setPw(""); setPw2(""); }
  };

  return (
    <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} transition={{duration:.4}}
      style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>

      <div style={{position:"absolute",inset:0,overflow:"hidden"}}>
        {BG.slice(0,80).map(s=>(
          <div key={s.id} style={{position:"absolute",left:`${s.x}%`,top:`${s.y}%`,width:s.r*1.5,height:s.r*1.5,borderRadius:"50%",background:"white",opacity:s.op*.4}}/>
        ))}
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 80% 80% at 50% 50%,rgba(88,28,135,.2) 0%,transparent 70%)"}}/>
      </div>

      <motion.div initial={{opacity:0,y:30}} animate={{opacity:1,y:0}} transition={{duration:.5}}
        className="glass glow-border" style={{width:440,borderRadius:20,padding:"32px 32px 28px",position:"relative",zIndex:10}}>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:28}}>
          <div>
            <h2 className="font-serif glow-text" style={{fontSize:24,color:"#f3e8ff"}}>Sanctum</h2>
            <p className="font-sans" style={{fontSize:11,color:"rgba(192,132,252,.4)",letterSpacing:".1em",textTransform:"uppercase",marginTop:2}}>Your Private Settings</p>
          </div>
          <button onClick={onBack} style={{background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.2)",borderRadius:8,padding:7,cursor:"pointer",color:"rgba(192,132,252,.5)",display:"flex"}}>
            <I.X size={15}/>
          </button>
        </div>

        <div style={{display:"flex",gap:6,marginBottom:24}}>
          {["profile","security"].map(t=>(
            <button key={t} onClick={()=>setTab(t)}
              style={{padding:"6px 16px",borderRadius:8,border:`1px solid ${tab===t?"rgba(168,85,247,.4)":"rgba(168,85,247,.15)"}`,background:tab===t?"rgba(126,34,206,.35)":"transparent",color:tab===t?"#c084fc":"rgba(192,132,252,.35)",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500,cursor:"pointer",transition:"all .2s",textTransform:"capitalize"}}>
              {t}
            </button>
          ))}
        </div>

        <AnimatePresence mode="wait">
          {tab==="profile"&&(
            <motion.div key="p" initial={{opacity:0,x:-10}} animate={{opacity:1,x:0}} exit={{opacity:0,x:10}} style={{display:"flex",flexDirection:"column",gap:16}}>
              <div style={{background:"rgba(88,28,135,.15)",borderRadius:12,padding:"14px 16px",border:"1px solid rgba(168,85,247,.15)"}}>
                <p className="font-sans" style={{fontSize:10,color:"rgba(192,132,252,.35)",letterSpacing:".12em",textTransform:"uppercase",marginBottom:4}}>Display Name</p>
                <p className="font-serif" style={{fontSize:16,color:"#e9d5ff"}}>{profile?.displayName||"Anonymous Wanderer"}</p>
                <p className="font-sans" style={{fontSize:10,color:"rgba(168,85,247,.3)",marginTop:4,fontStyle:"italic"}}>Never visible on your stars or reflections</p>
              </div>
              <div>
                <label className="font-sans" style={{display:"block",fontSize:11,color:"rgba(192,132,252,.45)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>Update Display Name</label>
                <input className="input-field" value={dn} onChange={e=>setDn(e.target.value)} placeholder="How you see yourself…"/>
              </div>
            </motion.div>
          )}
          {tab==="security"&&(
            <motion.div key="s" initial={{opacity:0,x:10}} animate={{opacity:1,x:0}} exit={{opacity:0,x:-10}} style={{display:"flex",flexDirection:"column",gap:14}}>
              <div>
                <label className="font-sans" style={{display:"block",fontSize:11,color:"rgba(192,132,252,.45)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>New Passphrase</label>
                <input className="input-field" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Leave blank to keep current"/>
              </div>
              <div>
                <label className="font-sans" style={{display:"block",fontSize:11,color:"rgba(192,132,252,.45)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>Confirm Passphrase</label>
                <input className="input-field" type="password" value={pw2} onChange={e=>setPw2(e.target.value)} placeholder="Confirm your new passphrase"/>
              </div>
            </motion.div>
          )}
        </AnimatePresence>

        <AnimatePresence>
          {(ok||er)&&<motion.p key="fb" initial={{opacity:0,y:-6}} animate={{opacity:1,y:0}} exit={{opacity:0}}
            className="font-sans" style={{fontSize:12,color:ok?"#86efac":"#f87171",textAlign:"center",marginTop:14}}>{ok||er}</motion.p>}
        </AnimatePresence>

        <div style={{marginTop:22,display:"flex",flexDirection:"column",gap:10}}>
          <button className="btn-primary" onClick={save} disabled={busy}
            style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,height:40,opacity:busy?.7:1}}>
            {busy?<span className="spin"><I.Sparkle size={13}/></span>:<I.Sparkle size={13}/>} {busy?"Saving…":"Preserve Changes"}
          </button>
          <button onClick={onLogout}
            style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.2)",color:"rgba(252,165,165,.6)",padding:"9px 0",borderRadius:8,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:7,transition:"all .2s"}}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(239,68,68,.2)";e.currentTarget.style.color="#fca5a5";}}
            onMouseLeave={e=>{e.currentTarget.style.background="rgba(239,68,68,.1)";e.currentTarget.style.color="rgba(252,165,165,.6)";}}>
            <I.LogOut size={13}/> Depart the Circle
          </button>
        </div>
      </motion.div>
    </motion.div>
  );
}

// ─── Mount ─────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
