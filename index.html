<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminis | Private Writing Circle</title>
    <!-- 1. Load Essential Libraries (CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');
        
        body { background: #080613; margin: 0; color: #f3e8ff; font-family: 'DM Sans', sans-serif; overflow: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(15, 8, 35, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(168, 85, 247, 0.15); }
        .glow-text { text-shadow: 0 0 20px rgba(192, 132, 252, 0.6); }
        .echo-card { filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.5)); }
        
        /* Star Animation */
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--duration) infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Mock Data ---
        const INITIAL_POSTS = [
            { id: 1, x: 20, y: 30, title: "The Cartographer", body: "She mapped coastlines that existed only between sleeping and waking...", echoes: ["Stunning imagery.", "I feel this deeply."] },
            { id: 2, x: 70, y: 20, title: "Taxonomy of Silences", body: "There is the silence before thunder — pregnant and mineral...", echoes: ["The silence after thunder... yes."] }
        ];

        function App() {
            const [view, setView] = useState('gate'); // gate, constellation
            const [selectedPost, setSelectedPost] = useState(null);
            const [user, setUser] = useState({ id: '', name: 'Anonymous Wanderer' });

            return (
                <div className="relative w-screen h-screen bg-[#080613] overflow-hidden">
                    {/* Universal Star Background */}
                    {[...Array(100)].map((_, i) => (
                        <div key={i} className="star" style={{
                            left: Math.random() * 100 + '%',
                            top: Math.random() * 100 + '%',
                            width: Math.random() * 2 + 'px',
                            height: Math.random() * 2 + 'px',
                            '--duration': Math.random() * 3 + 2 + 's'
                        }} />
                    ))}

                    <AnimatePresence mode="wait">
                        {view === 'gate' ? (
                            <motion.div key="gate" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="flex items-center justify-center h-full">
                                <div className="glass p-10 rounded-3xl w-96 text-center border-purple-500/30 shadow-2xl">
                                    <h1 className="font-serif text-4xl glow-text mb-2">Luminis</h1>
                                    <p className="text-purple-300/50 text-xs tracking-widest uppercase mb-8">The Private Circle</p>
                                    <input className="w-full bg-black/40 border border-purple-500/20 rounded-lg p-3 mb-4 outline-none focus:border-purple-500/60" placeholder="Unique ID" />
                                    <input className="w-full bg-black/40 border border-purple-500/20 rounded-lg p-3 mb-6 outline-none focus:border-purple-500/60" type="password" placeholder="Passphrase" />
                                    <button onClick={() => setView('constellation')} className="w-full bg-purple-700 hover:bg-purple-600 p-3 rounded-lg font-bold transition-all">Pass Through the Gate</button>
                                </div>
                            </motion.div>
                        ) : (
                            <motion.div key="map" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="h-full relative">
                                <div className="p-8">
                                    <h2 className="font-serif text-2xl glow-text">Luminis</h2>
                                    <p className="text-xs text-purple-400/40">THE CONSTELLATION</p>
                                </div>

                                {INITIAL_POSTS.map(post => (
                                    <motion.div 
                                        key={post.id}
                                        whileHover={{ scale: 1.5 }}
                                        onClick={() => setSelectedPost(post)}
                                        className="absolute cursor-pointer"
                                        style={{ left: post.x + '%', top: post.y + '%' }}
                                    >
                                        <div className="w-4 h-4 bg-purple-300 rounded-full blur-[2px] shadow-[0_0_15px_#c084fc]" />
                                    </motion.div>
                                ))}

                                <AnimatePresence>
                                    {selectedPost && (
                                        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 flex items-center justify-center p-6 z-50">
                                            <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={() => setSelectedPost(null)} />
                                            <motion.div initial={{ y: 50 }} animate={{ y: 0 }} className="glass max-w-xl w-full p-8 rounded-3xl relative z-10">
                                                <h3 className="font-serif text-3xl mb-4">{selectedPost.title}</h3>
                                                <p className="text-purple-100/80 leading-relaxed mb-8 italic">"{selectedPost.body}"</p>
                                                <div className="border-t border-purple-500/20 pt-6">
                                                    <h4 className="text-xs uppercase tracking-widest text-purple-400/50 mb-4">Reflections</h4>
                                                    {selectedPost.echoes.map((echo, i) => (
                                                        <div key={i} className="echo-card text-sm bg-purple-900/20 p-3 rounded-lg mb-2 border-none">
                                                            {echo}
                                                        </div>
                                                    ))}
                                                </div>
                                                <button onClick={() => setSelectedPost(null)} className="absolute top-4 right-4 text-purple-400 hover:text-white">✕</button>
                                            </motion.div>
                                        </motion.div>
                                    )}
                                </AnimatePresence>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
