<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luminis — Private Writing Circle</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Fixed Framer Motion CDN -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  
  <!-- Tailwind for the styling -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background: #080613; color: #f3e8ff; margin: 0; overflow: hidden; font-family: 'DM Sans', sans-serif; }
    .glass { background: rgba(15, 8, 35, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(168, 85, 247, 0.15); }
    .glow-text { text-shadow: 0 0 20px rgba(192, 132, 252, 0.6); }
    .star-bg { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0.3; }
    .echo-card { filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.5)); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    // Fix for the 'motion' is undefined error
    const motion = window.Motion || window.FramerMotion.motion;
    const AnimatePresence = window.Motion?.AnimatePresence || window.FramerMotion.AnimatePresence;

    function App() {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [view, setView] = useState('login'); // login, constellation, settings

      // Minimal Starfield Component
      const StarField = () => (
        <div className="absolute inset-0 pointer-events-none">
          {[...Array(100)].map((_, i) => (
            <div key={i} className="star-bg" style={{
              top: `${Math.random() * 100}%`,
              left: `${Math.random() * 100}%`,
              animation: `pulse ${2 + Math.random() * 4}s infinite`
            }} />
          ))}
        </div>
      );

      if (view === 'login') {
        return (
          <div className="h-screen w-full flex items-center justify-center relative bg-[#080613]">
            <StarField />
            <motion.div 
              initial={{ opacity: 0, y: 20 }} 
              animate={{ opacity: 1, y: 0 }}
              className="glass p-10 rounded-2xl w-96 z-10 text-center"
            >
              <h1 className="text-4xl font-serif glow-text mb-6">Luminis</h1>
              <input type="text" placeholder="Club ID" className="w-full p-3 mb-4 rounded bg-black/40 border border-purple-500/30 outline-none" />
              <input type="password" placeholder="Passphrase" className="w-full p-3 mb-6 rounded bg-black/40 border border-purple-500/30 outline-none" />
              <button 
                onClick={() => setView('constellation')}
                className="w-full py-3 bg-purple-600 hover:bg-purple-500 rounded-lg transition-all font-bold"
              >
                Enter the Void
              </button>
            </motion.div>
          </div>
        );
      }

      return (
        <div className="h-screen w-full relative bg-[#080613] overflow-hidden">
          <StarField />
          <nav className="p-6 flex justify-between items-center relative z-10">
            <h2 className="text-xl font-serif glow-text">Luminis Constellation</h2>
            <button onClick={() => setView('login')} className="text-purple-300 hover:text-white">Logout</button>
          </nav>
          
          <div className="flex items-center justify-center h-full">
             <motion.div 
              animate={{ scale: [1, 1.1, 1], opacity: [0.5, 1, 0.5] }}
              transition={{ repeat: Infinity, duration: 4 }}
              className="w-4 h-4 bg-purple-400 rounded-full cursor-pointer shadow-[0_0_20px_purple]"
              onClick={() => alert("This star contains a secret message...")}
             />
             <p className="absolute bottom-10 text-purple-400/50 text-sm italic">Click a star to read whispers</p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</body>
</html>
